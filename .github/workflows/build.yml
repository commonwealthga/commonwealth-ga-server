name: Build

on:
  push:
    branches:
      - "**"

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # mingw-w64 provides both i686-w64-mingw32-g++ (DLLs) and
      # x86_64-w64-mingw32-g++ (control-server.exe). Linux control-server
      # uses the system g++ (preinstalled on ubuntu-latest).
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build DLLs and Control Server
        run: make all control-server
        continue-on-error: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            out/version.dll
            out/dinput8.dll
            out/control-server
            out/control-server.exe
          if-no-files-found: error
